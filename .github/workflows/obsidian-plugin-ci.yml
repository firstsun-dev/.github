name: Shared Obsidian Plugin CI

on:
  workflow_call:
    inputs:
      plugin-id:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
    secrets:
      RELEASE_TOKEN:
        required: false

jobs:
  filter:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'manifest.json'
              - 'tsconfig.json'
              - 'esbuild.config.mjs'
              - 'eslint.config.*'
              - 'vitest.config.ts'
              - 'styles.css'

  lint:
    name: Lint
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: filter
    if: needs.filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Build (Compatibility Check)
        run: npm run build
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: Upload coverage
        if: matrix.node-version == inputs.node-version
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          overwrite: true

  artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: [filter, test]
    if: needs.filter.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Create plugin package
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          BRANCH_NAME_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ZIP_NAME="${{ inputs.plugin-id }}-${VERSION}-${BRANCH_NAME_SAFE}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css || zip -j "$ZIP_NAME" main.js manifest.json
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-build-artifact-${{ github.sha }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7
      - name: Annotate build summary
        run: |
          echo "::notice title=Obsidian Plugin Build::${{ inputs.plugin-id }} v${{ env.PLUGIN_VERSION }} built (${{ env.ZIP_NAME }})"
          {
            echo "### Obsidian Plugin Build"
            echo ""
            echo "- Plugin: \`${{ inputs.plugin-id }}\`"
            echo "- Version: \`${{ env.PLUGIN_VERSION }}\`"
            echo "- Artifact: \`${{ env.ZIP_NAME }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [filter, lint, test]
    if: needs.filter.outputs.code == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Attest main.js
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: main.js
      - name: Attest styles.css
        if: hashFiles('styles.css') != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: styles.css
      - env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: npx semantic-release
