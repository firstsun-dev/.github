name: ZAP Scan Template

# ---------------------------------------------------------------------------
# Reusable ZAP security scan template.
# baseline and api scans run in parallel via matrix.
#
# scan_mode: baseline — fast, passive, safe for prod
#            full     — active attack payloads, dev only
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      target_url:
        type: string
        required: true
      openapi_path:
        description: Path to OpenAPI spec, e.g. /doc. Empty skips API scan.
        type: string
        default: ''
      runner:
        type: string
        default: linux
      scan_mode:
        description: baseline or full
        type: string
        default: baseline
      run_label:
        description: Short label shown in job name to identify trigger source
        type: string
        default: ''
    secrets:
      ZAP_DOC_BASIC_AUTH:
        required: false

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  zap-scan:
    name: >-
      ZAP ${{ inputs.scan_mode }} ${{ matrix.type }}
      ${{ inputs.run_label != '' && format('[{0}]', inputs.run_label) || '' }}
      - ${{ inputs.app_name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        type: ${{ fromJson(inputs.openapi_path != '' && '["baseline","api"]' || '["baseline"]') }}
    steps:
      - name: Prepare API spec
        if: matrix.type == 'api'
        id: api
        run: |
          CREDS=$(echo "$ZAP_BASIC_AUTH" | base64 -d)
          echo "::add-mask::$CREDS"
          # ZAP's HTTP client rejects URL-embedded credentials (RFC 9110 deprecated).
          # Download spec via curl and pass the local file to the action instead.
          SPEC_FILE="openapi-spec-${{ inputs.app_name }}.json"
          curl -fsSL -u "$CREDS" "${{ inputs.target_url }}${{ inputs.openapi_path }}" -o "$SPEC_FILE"
          # ZAP mounts $PWD as /zap/wrk inside the container
          echo "spec=/zap/wrk/$SPEC_FILE" >> $GITHUB_OUTPUT
        env:
          ZAP_BASIC_AUTH: ${{ secrets.ZAP_DOC_BASIC_AUTH }}

      - name: ZAP Baseline Scan
        if: matrix.type == 'baseline' && inputs.scan_mode == 'baseline'
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-${{ inputs.app_name }}

      - name: ZAP Full Scan
        if: matrix.type == 'baseline' && inputs.scan_mode == 'full'
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-full-${{ inputs.app_name }}

      - name: ZAP API Scan
        if: matrix.type == 'api'
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: ${{ steps.api.outputs.spec }}
          format: openapi
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-api-${{ inputs.app_name }}

      - name: Annotate findings
        if: always()
        env:
          APP: ${{ inputs.app_name }}
          SCAN: ${{ matrix.type }}
        run: |
          [ -f report_json.json ] || exit 0

          HIGH=$(jq '[.site[].alerts[] | select(.riskcode=="3")] | length' report_json.json 2>/dev/null || echo 0)
          MED=$(jq  '[.site[].alerts[] | select(.riskcode=="2")] | length' report_json.json 2>/dev/null || echo 0)
          LOW=$(jq  '[.site[].alerts[] | select(.riskcode=="1")] | length' report_json.json 2>/dev/null || echo 0)
          INFO=$(jq '[.site[].alerts[] | select(.riskcode=="0")] | length' report_json.json 2>/dev/null || echo 0)

          HIGH_COLOR=$( [ "$HIGH" -gt 0 ] && echo "critical"   || echo "brightgreen" )
          MED_COLOR=$(  [ "$MED"  -gt 0 ] && echo "important"  || echo "brightgreen" )
          LOW_COLOR=$(  [ "$LOW"  -gt 0 ] && echo "yellow"     || echo "brightgreen" )

          {
            echo "## ZAP \`${APP}\` — ${SCAN}"
            echo ""
            echo "![High](https://img.shields.io/badge/High-${HIGH}-${HIGH_COLOR}?style=flat-square) ![Medium](https://img.shields.io/badge/Medium-${MED}-${MED_COLOR}?style=flat-square) ![Low](https://img.shields.io/badge/Low-${LOW}-yellow?style=flat-square) ![Info](https://img.shields.io/badge/Info-${INFO}-informational?style=flat-square)"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          if [ $((HIGH + MED + LOW + INFO)) -gt 0 ]; then
            {
              echo "| Risk | Alert | Solution |"
              echo "|------|-------|----------|"
              jq -r '
                .site[].alerts[] |
                "| \(.riskdesc) | \(.name) | \(.solution | gsub("<[^>]+>";"") | .[0:120]) |"
              ' report_json.json
            } >> $GITHUB_STEP_SUMMARY
          fi

          SUMMARY="${HIGH} High, ${MED} Medium, ${LOW} Low, ${INFO} Info"
          NAMES=$(jq -r '[.site[].alerts[].name] | unique | join(" | ")' report_json.json 2>/dev/null)
          [ $((HIGH + MED + LOW + INFO)) -gt 0 ] \
            && echo "::warning title=[${APP}|${SCAN}] ${SUMMARY}::${NAMES}" \
            || echo "::notice title=[${APP}|${SCAN}]::No alerts found"
