name: ZAP Scan Template

# ---------------------------------------------------------------------------
# Reusable ZAP security scan template.
# baseline and api scans run in parallel via matrix.
#
# scan_mode: baseline — fast, passive, safe for prod
#            full     — active attack payloads, dev only
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      target_url:
        type: string
        required: true
      openapi_path:
        description: Path to OpenAPI spec, e.g. /doc. Empty skips API scan.
        type: string
        default: ''
      runner:
        type: string
        default: linux
      scan_mode:
        description: baseline or full
        type: string
        default: baseline
    secrets:
      ZAP_DOC_BASIC_AUTH:
        required: false

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  zap-scan:
    name: ZAP ${{ inputs.scan_mode }} ${{ matrix.type }} - ${{ inputs.app_name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        type: ${{ fromJson(inputs.openapi_path != '' && '["baseline","api"]' || '["baseline"]') }}
    steps:
      - name: Prepare API target URL
        if: matrix.type == 'api'
        id: api
        run: |
          CREDS=$(echo "$ZAP_BASIC_AUTH" | base64 -d)
          echo "::add-mask::$CREDS"
          PROTO=$(echo "${{ inputs.target_url }}" | grep -oP '^https?://')
          HOST=$(echo "${{ inputs.target_url }}" | sed 's|^https\?://||')
          API_URL="${PROTO}${CREDS}@${HOST}${{ inputs.openapi_path }}"
          echo "::add-mask::$API_URL"
          echo "url=$API_URL" >> $GITHUB_OUTPUT
        env:
          ZAP_BASIC_AUTH: ${{ secrets.ZAP_DOC_BASIC_AUTH }}

      - name: ZAP Baseline Scan
        if: matrix.type == 'baseline' && inputs.scan_mode == 'baseline'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          artifact_name: zap-baseline-${{ inputs.app_name }}

      - name: ZAP Full Scan
        if: matrix.type == 'baseline' && inputs.scan_mode == 'full'
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          artifact_name: zap-full-${{ inputs.app_name }}

      - name: ZAP API Scan
        if: matrix.type == 'api'
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: ${{ steps.api.outputs.url }}
          format: openapi
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          artifact_name: zap-api-${{ inputs.app_name }}
